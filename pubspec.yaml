name: noise_app
description: "Smart Classroom Noise Monitor - Mobile App"
publish_to: 'none'
version: 1.5.0+2

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  supabase_flutter: ^2.8.1
  fl_chart: ^0.69.2
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  pdf: ^3.11.1
  printing: ^5.13.4
  path_provider: ^2.1.4
  open_file: ^3.5.7
  url_launcher: ^6.3.1
  provider: ^6.1.2
  shimmer: ^3.0.0
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/EspNoise.png"

flutter:
  uses-material-design: true